<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFlex Transformador</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" id="login-card">
        <h1>DFlex Transformador</h1>
        <p class="muted">Iniciá sesión para transformar la lista y descargar el Excel listo para importar.</p>

        <form id="login-form" class="stack">
          <label>
            <span>Usuario</span>
            <input type="text" name="username" autocomplete="username" required />
          </label>

          <label>
            <span>Contraseña</span>
            <input type="password" name="password" autocomplete="current-password" required />
          </label>

          <button type="submit">Ingresar</button>
        </form>

        <p id="login-message" class="message" aria-live="polite"></p>
      </section>

      <section class="card hidden" id="app-card">
        <div class="row row-between row-wrap">
          <div>
            <h2>Transformar archivo</h2>
            <p class="muted">Subí la lista base en formato <strong>.xls</strong> o <strong>.xlsx</strong>.</p>
          </div>
          <button id="logout-btn" class="secondary" type="button">Cerrar sesión</button>
        </div>

        <form id="transform-form" class="stack">
          <label class="file-input">
            <span>Archivo</span>
            <input type="file" name="file" accept=".xls,.xlsx" required />
          </label>

          <button type="submit" id="submit-btn">Transformar y descargar</button>
        </form>

        <p id="transform-message" class="message" aria-live="polite"></p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
